appId: com.bvisionry.connect
tags:
  - smoke
---
- launchApp:
    clearState: true
- assertVisible:
    id: "sign-in-email"
- tapOn:
    id: "sign-in-email"
- inputText: "maestro-smoke@example.com"
# `sign-in-submit` is now the password button. The magic-link flow that this
# smoke flow exercises lives behind `sign-in-magic-link`, which still shows
# the `sign-in-sent` success banner.
- tapOn:
    id: "sign-in-magic-link"
- assertVisible:
    id: "sign-in-sent"
