name: connect_mobile
description: "BVisionry Connect (Flutter rebuild)"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.0
  supabase_flutter: ^2.8.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  google_fonts: ^6.2.1
  lucide_icons_flutter: ^3.0.5
  cached_network_image: ^3.4.1

  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  formz: ^0.7.0
  intl: ^0.20.2
  app_links: ^6.3.2

  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  firebase_analytics: ^11.3.5
  firebase_crashlytics: ^4.2.0
  sentry_flutter: ^8.11.2

  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  flutter_image_compress: ^2.3.0
  record: ^5.2.0
  just_audio: ^0.9.42

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3
  mocktail: ^1.0.4
  golden_toolkit: ^0.15.0

flutter:
  uses-material-design: true
  assets:
    - lib/core/i18n/locales/en.json
    - lib/core/i18n/locales/es.json
