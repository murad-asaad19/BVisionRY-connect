name: connect_mobile
description: "BVisionry Connect (Flutter rebuild)"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  app_links: ^6.3.2
  audio_waveforms: ^1.2.0
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  firebase_analytics: ^11.3.5
  firebase_core: ^3.8.0
  firebase_crashlytics: ^4.2.0
  firebase_messaging: ^15.1.5
  flutter:
    sdk: flutter
  flutter_image_compress: ^2.3.0
  flutter_localizations:
    sdk: flutter
  flutter_markdown: ^0.7.4+3
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.2
  flutter_timezone: ^4.1.0
  formz: ^0.7.0
  freezed_annotation: ^2.4.4
  go_router: ^14.6.0
  google_fonts: ^6.2.1
  image_cropper: ^8.0.2
  image_picker: ^1.1.2
  intl: ^0.20.2
  json_annotation: ^4.9.0
  just_audio: ^0.9.42
  lucide_icons_flutter: ^3.0.5
  package_info_plus: ^8.1.2
  path_provider: ^2.1.5
  record: ^5.2.0
  riverpod_annotation: ^2.6.1
  sentry_flutter: ^8.11.2
  share_plus: ^10.1.2
  shared_preferences: ^2.3.3
  shimmer: ^3.0.0
  supabase_flutter: ^2.8.0
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  visibility_detector: ^0.4.0+2

dev_dependencies:
  build_runner: ^2.4.13
  custom_lint: ^0.7.0
  flutter_launcher_icons: ^0.14.1
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.3
  flutter_test:
    sdk: flutter
  freezed: ^2.5.7
  golden_toolkit: ^0.15.0
  integration_test:
    sdk: flutter
  json_serializable: ^6.9.0
  mocktail: ^1.0.4
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3
  # Phase 14 (Task 17): build-time symbol upload for Sentry. The actual
  # `sentry.properties` (org / project / auth_token) is wired in Phase 15
  # release config.
  sentry_dart_plugin: ^2.4.0

# custom_lint 0.7.3 / riverpod_lint 2.6.4 pin analyzer_plugin to 0.12.0, which
# only compiles against analyzer 6.x. Our toolchain resolves analyzer 7.6.0
# (a transitive of newer packages) so we override analyzer_plugin to a 7.x-
# compatible release. Codegen (build_runner / freezed / json_serializable)
# happens out-of-process so the lint plugins are unaffected at editor time.
dependency_overrides:
  analyzer_plugin: ^0.13.0

flutter:
  uses-material-design: true
  assets:
    - lib/core/i18n/locales/en.json
    - lib/core/i18n/locales/es.json

# Phase 15 — launcher icons (run `dart run flutter_launcher_icons`).
# Source assets MUST be provided in `assets/icon/` (1024x1024 PNG navy +
# gold logo) before this is invoked — they are intentionally NOT in this
# repo. See README for design spec.
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0F3460"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#0F3460"
    theme_color: "#FFC107"

# Phase 15 — native splash (run `dart run flutter_native_splash:create`).
# Same prerequisite re: missing assets as launcher_icons.
flutter_native_splash:
  color: "#0F3460"
  image: "assets/splash/splash_logo.png"
  android_12:
    image: "assets/splash/splash_logo.png"
    icon_background_color: "#0F3460"
  ios_content_mode: center
  fullscreen: true

# Phase 15 — sentry_dart_plugin config. The build-time upload of dSYMs
# (iOS) + ProGuard mappings / Dart source maps (Android) is wired here.
# `project`, `org`, and `auth_token` resolve from environment variables
# (SENTRY_ORG / SENTRY_PROJECT / SENTRY_AUTH_TOKEN) OR from
# `sentry.properties` (gitignored — see sentry.properties.example).
sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  upload_sources: true
  project: connect-flutter
  org: bvisionry
