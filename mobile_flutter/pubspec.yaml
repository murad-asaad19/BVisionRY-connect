name: connect_mobile
description: "BVisionry Connect (Flutter rebuild)"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  app_links: ^6.3.2
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  firebase_analytics: ^11.3.5
  firebase_core: ^3.8.0
  firebase_crashlytics: ^4.2.0
  firebase_messaging: ^15.1.5
  flutter:
    sdk: flutter
  flutter_image_compress: ^2.3.0
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.2
  formz: ^0.7.0
  freezed_annotation: ^2.4.4
  go_router: ^14.6.0
  google_fonts: ^6.2.1
  image_cropper: ^8.0.2
  image_picker: ^1.1.2
  intl: ^0.20.2
  json_annotation: ^4.9.0
  just_audio: ^0.9.42
  lucide_icons_flutter: ^3.0.5
  record: ^5.2.0
  riverpod_annotation: ^2.6.1
  sentry_flutter: ^8.11.2
  shared_preferences: ^2.3.3
  supabase_flutter: ^2.8.0
  url_launcher: ^6.3.1

dev_dependencies:
  build_runner: ^2.4.13
  custom_lint: ^0.7.0
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.7
  golden_toolkit: ^0.15.0
  integration_test:
    sdk: flutter
  json_serializable: ^6.9.0
  mocktail: ^1.0.4
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3

# custom_lint 0.7.3 / riverpod_lint 2.6.4 pin analyzer_plugin to 0.12.0, which
# only compiles against analyzer 6.x. Our toolchain resolves analyzer 7.6.0
# (a transitive of newer packages) so we override analyzer_plugin to a 7.x-
# compatible release. Codegen (build_runner / freezed / json_serializable)
# happens out-of-process so the lint plugins are unaffected at editor time.
dependency_overrides:
  analyzer_plugin: ^0.13.0

flutter:
  uses-material-design: true
  assets:
    - lib/core/i18n/locales/en.json
    - lib/core/i18n/locales/es.json
