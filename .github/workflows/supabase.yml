name: supabase

on:
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - ".github/workflows/supabase.yml"
  pull_request:
    paths:
      - "supabase/**"
      - ".github/workflows/supabase.yml"

concurrency:
  group: supabase-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: db lint + deno check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Cache Supabase CLI
        uses: actions/cache@v4
        with:
          path: ~/.cache/supabase
          key: ${{ runner.os }}-supabase-cli-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-supabase-cli-

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: supabase db lint
        run: supabase db lint

      - name: deno check edge functions
        run: deno check supabase/functions/**/index.ts

  smoke:
    name: local stack smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Cache Supabase CLI
        uses: actions/cache@v4
        with:
          path: ~/.cache/supabase
          key: ${{ runner.os }}-supabase-cli-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-supabase-cli-

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Install npm dependencies
        run: npm ci

      - name: Start Supabase local stack
        run: supabase start

      - name: Reset DB (apply migrations + seed)
        run: supabase db reset --no-seed

      - name: Run pgTAP tests
        run: npm run supabase:test

      - name: Run Deno edge-function tests
        run: npm run functions:test

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup
