name: backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: build + check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Show toolchain
        working-directory: backend
        run: |
          ./gradlew --version

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      # Testcontainers + Phase 0b's DockerPostgresFixture both need Docker
      # available on the runner. ubuntu-latest images ship Docker by
      # default, so no setup-docker action is needed.
      - name: gradlew check
        working-directory: backend
        env:
          # Phase 0b/0d ITs honour this env var to skip Docker-backed
          # containers when the runner has no Docker. Default is to run.
          CONNECT_SKIP_DB_IT: "false"
        run: ./gradlew check --no-daemon --stacktrace

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_id }}
          path: |
            backend/**/build/reports/tests/
            backend/**/build/test-results/
          if-no-files-found: ignore
          retention-days: 14

  images:
    name: container images
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        unit: [api, workers, admin, scheduler]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Build ${{ matrix.unit }} bootJar
        working-directory: backend
        run: ./gradlew :${{ matrix.unit }}:bootJar --no-daemon

      # Spring Boot 3.x's bootBuildImage produces an OCI image without a
      # Dockerfile. Configure the registry via the BP_OCI_* env vars at
      # the Terraform layer (Phase 4 owns that). Until then we just build
      # locally to validate the JAR + Buildpack happy path.
      - name: bootBuildImage ${{ matrix.unit }}
        working-directory: backend
        run: ./gradlew :${{ matrix.unit }}:bootBuildImage --no-daemon
        env:
          BP_JVM_VERSION: "21"
