name: flutter-release

# Signed Android release build (App Bundle for Play Store).
#
# Triggered manually or by pushing a version tag (e.g. v1.0.0). Produces a
# signed .aab artifact. The PR/push CI in flutter-ci.yml stays a fast
# debug-smoke; this workflow is the actual release path.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64   - base64 of the upload keystore (.jks)
#                               `base64 -w0 connect-release.jks` (Linux)
#                               `[Convert]::ToBase64String([IO.File]::ReadAllBytes('connect-release.jks'))` (PowerShell)
#   ANDROID_KEYSTORE_PASSWORD - keystore (store) password
#   ANDROID_KEY_PASSWORD      - key password
#   ANDROID_KEY_ALIAS         - key alias (project convention: "connect")
#   SUPABASE_URL              - production Supabase URL
#   SUPABASE_ANON_KEY         - production Supabase anon key
#   SENTRY_DSN                - production Sentry DSN (or leave secret unset)
#   SENTRY_AUTH_TOKEN         - Sentry token for build-time symbol upload
#   SENTRY_ORG / SENTRY_PROJECT optional override (default org=bvisionry, project=connect-flutter)
#   GOOGLE_SERVICES_JSON_BASE64 - optional: base64 google-services.json for FCM/Crashlytics
#
# google-services is applied only if android/app/google-services.json exists,
# so FCM/Crashlytics are opt-in via that secret.

on:
  workflow_dispatch:
    inputs:
      invite_only:
        description: 'Build with INVITE_ONLY=true (invite-gated sign-up)'
        type: boolean
        default: false
  push:
    tags:
      - 'v*'

jobs:
  android-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_flutter
    steps:
      - uses: actions/checkout@v4

      - name: Require signing secret
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 is not set — cannot produce a signed release. See .github/workflows/flutter-release.yml header."
            exit 1
          fi

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.0'
          channel: stable

      - run: flutter --version
      - run: flutter pub get

      - name: Decode keystore
        run: |
          mkdir -p android/keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/keystore/connect-release.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../keystore/connect-release.jks
          EOF

      - name: Optional google-services.json
        if: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 != '' }}
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > android/app/google-services.json

      - name: Write prod env
        run: |
          cat > env/prod.json <<EOF
          {
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}",
            "SENTRY_DSN": "${{ secrets.SENTRY_DSN }}",
            "SENTRY_ENV": "prod",
            "FIREBASE_ENABLED": "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 != '' }}",
            "APP_LINKS_HOST": "connect.bvisionry.com",
            "APP_SCHEME": "connect-mobile"
          }
          EOF

      - name: Build App Bundle (release)
        env:
          # Build-time Sentry symbol upload (sentry_dart_plugin). Without a
          # token the plugin fails the build — supply SENTRY_AUTH_TOKEN.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          INVITE_FLAG=""
          if [ "${{ github.event.inputs.invite_only }}" = "true" ]; then
            INVITE_FLAG="--dart-define=INVITE_ONLY=true"
          fi
          flutter build appbundle --release \
            --dart-define-from-file=env/prod.json \
            $INVITE_FLAG

      - uses: actions/upload-artifact@v4
        with:
          name: connect-release-aab
          path: mobile_flutter/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
